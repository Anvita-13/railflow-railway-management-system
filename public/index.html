<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Management | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-brand">
            <h1>Railway Management</h1>
            <p>Official Portal</p>
        </div>
        <form id="login-form" class="login-form">
            <h2>Authorized Login</h2>
            <div class="form-group">
                <label for="id">Official ID</label>
                <input type="text" id="id" placeholder="Enter your ID" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn primary-btn btn-full">Secure Login</button>
            </div>
            <p id="login-error" class="error-msg"></p>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const password = document.getElementById('password').value;
            try {
                const res = await apiLogin(id, password);
                if (res.success) {
                    sessionStorage.setItem('currentUserId', res.officer.ID || res.officer.id);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('login-error').innerText = res.message || 'Login failed.';
                }
            } catch (err) {
                document.getElementById('login-error').innerText = 'Network error or Invalid credentials.';
            }
        });
    </script>
</body>
</html>
